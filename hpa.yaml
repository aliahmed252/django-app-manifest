# hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: malerator-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: malerator-app # Must match the deployment name
  minReplicas: 2 # Minimum number of pods
  maxReplicas: 4 # Maximum number of pods
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization # Scale based on average CPU utilization across all pods
        averageUtilization: 70 # Scale up when CPU utilization reaches 70%
